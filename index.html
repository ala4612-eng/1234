function wrongNums(score,total,seed){
  const wc=Math.round((100-score)/100*total);
  const idxs=[];let i=(seed*31+7)%total;
  for(let c=0;c<wc;c++){i=(i*7+11)%total;while(idxs.includes(i))i=(i+3)%total;idxs.push(i);}
  return idxs.map(x=>x+1).sort((a,b)=>a-b);
}

    ch['subj']=new Chart(document.getElementById('cSubj'),{type:'bar',data:{labels:SN,datasets:[{label:'학급 평균',data:scores,backgroundColor:SCOL.map(c=>c+'44'),borderColor:SCOL,borderWidth:1.5,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,grid:{color:'rgba(128,128,128,0.08)'},ticks:{font:{size:9}}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
    const gl=SK.map(([k,gk],i)=>{const cnt=new Array(9).fill(0);RAW.forEach(r=>{const g=r[gk];if(g>=1&&g<=9)cnt[g-1]++;});return`<div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:2px">${SN[i]}: ${cnt.map((c,gi)=>c?`<span class="gb" style="background:${GB[gi+1]};color:${GC[gi+1]}">${gi+1}(${c})</span>`:'').join(' ')}</div>`;}).join('');
    document.getElementById('subj-detail').innerHTML=gl;
  } else {
    ch['subj']=new Chart(document.getElementById('cSubj'),{type:'radar',data:{labels:SN,datasets:[{label:s.name,data:SK.map(([k])=>s[k]),borderColor:'#378ADD',backgroundColor:'#378ADD22',borderWidth:2,pointRadius:3},{label:'학급평균',data:avgs,borderColor:'#888780',backgroundColor:'rgba(0,0,0,0)',borderWidth:1.5,borderDash:[4,3],pointRadius:2}]},options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:100,ticks:{stepSize:25,font:{size:9}},grid:{color:'rgba(128,128,128,0.12)'}}},plugins:{legend:{display:false}}}});
    document.getElementById('subj-detail').innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:4px">${SK.map(([k,gk],i)=>{const g=s[gk];return`<span style="font-size:10px;background:var(--color-background-secondary);padding:2px 5px;border-radius:3px">${SN[i]}: <b>${s[k]}</b> <span class="gb" style="background:${GB[g]};color:${GC[g]}">${g}등</span><span style="color:${s[k]-avgs[i]>=0?'#1D9E75':'#D85A30'};margin-left:2px">${s[k]-avgs[i]>=0?'+':''}${parseFloat((s[k]-avgs[i]).toFixed(1))}</span></span>`;}).join('')}</div>`;
  }
}

function renderRank(who,s){
  const el=document.getElementById('rank-body');
  const sorted=[...RAW].sort((a,b)=>tot(b)-tot(a));
  if(!s){
    el.innerHTML=`<div style="overflow-y:auto;max-height:260px"><table class="tbl"><thead><tr><th style="width:22px">석차</th><th>이름</th><th style="width:36px">총점</th><th style="width:44px">백분위</th><th style="width:52px">상위</th></tr></thead><tbody>${sorted.map((r,i)=>{const t=tot(r),pct=parseFloat(((i+1)/28*100).toFixed(1));return`<tr><td style="font-weight:500">${i+1}</td><td>${r.n}. ${r.name}</td><td style="font-weight:500">${t}</td><td>${pct}%</td><td style="color:#1D9E75;font-size:10px">상위${parseFloat((100-pct+0.1).toFixed(1))}%</td></tr>`;}).join('')}</tbody></table></div>`;
  } else {
    const rank=sorted.findIndex(r=>r.name===s.name)+1;const pct=parseFloat((rank/28*100).toFixed(1));
    el.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">
      <div class="metric"><p class="ml">반 내 석차</p><p class="mv">${rank}위</p><p class="ms">/ 28명</p></div>
      <div class="metric"><p class="ml">백분위</p><p class="mv">${pct}%</p></div>
      <div class="metric"><p class="ml">상위</p><p class="mv">${parseFloat((100-pct+0.1).toFixed(1))}%</p></div>
    </div>
    <table class="tbl"><thead><tr><th>과목</th><th>점수</th><th>등급</th><th>반 내 석차</th></tr></thead><tbody>
    ${SK.map(([k,gk],i)=>{const g=s[gk],sr=[...RAW].sort((a,b)=>b[k]-a[k]).findIndex(r=>r.name===s.name)+1;return`<tr><td style="font-weight:500">${SN[i]}</td><td>${s[k]}</td><td><span class="gb" style="background:${GB[g]};color:${GC[g]}">${g}등급</span></td><td>${sr}위 / 28명</td></tr>`;}).join('')}
    </tbody></table>`;
  }
}

function renderWeak(who,s){
  const el=document.getElementById('weak-body');
  const ref=s?SK.map(([k])=>s[k]):avgs;
  const overall=ref.reduce((a,b)=>a+b)/ref.length;
  const items=SK.map(([k,gk],i)=>({name:SN[i],val:ref[i],diff:ref[i]-overall,grade:s?s[gk]:null})).sort((a,b)=>a.val-b.val);
  el.innerHTML=items.map(({name,val,diff,grade})=>{
    const isW=diff<-4,isS=diff>4;const col=isW?'#D85A30':isS?'#1D9E75':'#378ADD';
    const lbl=isW?'취약':isS?'강점':'보통';const lc=isW?'#FAECE7':isS?'#E1F5EE':'#E6F1FB';const lt=isW?'#993C1D':isS?'#0F6E56':'#185FA5';
    const gTag=grade?`<span class="gb" style="background:${GB[grade]};color:${GC[grade]}">${grade}등</span>`:'';
    return`<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1px">
      <div style="display:flex;align-items:center;gap:4px"><span style="font-size:11px;font-weight:500">${name}</span><span class="gb" style="background:${lc};color:${lt}">${lbl}</span>${gTag}</div>
      <span style="font-size:11px;font-weight:500">${val.toFixed(0)}<span style="font-size:10px;color:${diff>=0?'#1D9E75':'#D85A30'};margin-left:3px">${diff>=0?'+':''}${diff.toFixed(1)}</span></span>
    </div><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,val)}%;background:${col}"></div></div></div>`;
  }).join('');
}

function renderDist(){
  dc('dist');
  const gc=SK.map(([k,gk])=>{const c=new Array(9).fill(0);RAW.forEach(r=>{const g=r[gk];if(g>=1&&g<=9)c[g-1]++;});return c;});
  ch['dist']=new Chart(document.getElementById('cDist'),{type:'bar',data:{labels:SN,datasets:[1,2,3,4,5,6,7,8,9].map((g,gi)=>({label:`${g}등급`,data:SK.map((_,si)=>gc[si][gi]),backgroundColor:GC[g]+'bb',borderColor:GC[g],borderWidth:0,stack:'a'}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:10}}},y:{stacked:true,grid:{color:'rgba(128,128,128,0.08)'},ticks:{stepSize:5,font:{size:9}}}}}});
  document.getElementById('dist-legend').innerHTML=[1,2,3,4,5,6,7,8,9].map(g=>`<span style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--color-text-secondary)"><span style="width:8px;height:8px;border-radius:2px;background:${GC[g]}"></span>${g}등급</span>`).join('');
}

function renderList(who){
  const top20=[...RAW].sort((a,b)=>a.t3-b.t3||tot(b)-tot(a)).slice(0,20);
  const hl=who!=='all'?who:null;const medalColor=['#B8860B','#888780','#CD7F32'];
  const rows=top20.map((r,i)=>{
    const isMe=hl===r.name;
    const rankCell=i<3?`<td><span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:${medalColor[i]};color:#fff;font-size:9px;font-weight:500">${i+1}</span></td>`:`<td style="font-weight:500;color:var(--color-text-secondary)">${i+1}</td>`;
    return`<tr style="${isMe?'background:var(--color-background-info);':''}">${rankCell}<td style="text-align:left">${r.n}. ${r.name}</td><td style="font-weight:500;color:#185FA5">${r.t3}</td><td><span class="gb" style="background:${GB[r.kg]};color:${GC[r.kg]}">${r.k}(${r.kg})</span></td><td><span class="gb" style="background:${GB[r.mg]};color:${GC[r.mg]}">${r.m}(${r.mg})</span></td><td><span class="gb" style="background:${GB[r.eg]};color:${GC[r.eg]}">${r.e}(${r.eg})</span></td><td>${tot(r)}</td><td style="font-size:10px;color:var(--color-text-secondary)">${r.school}</td></tr>`;
  }).join('');
  let extraRow='';
  if(hl&&!top20.find(r=>r.name===hl)){
    const s=RAW.find(r=>r.name===hl);const myRank=[...RAW].sort((a,b)=>a.t3-b.t3||tot(b)-tot(a)).findIndex(r=>r.name===hl)+1;
    extraRow=`<tr style="background:var(--color-background-info);border-top:1px dashed var(--color-border-secondary)"><td style="color:var(--color-text-secondary)">${myRank}</td><td style="text-align:left">${s.n}. ${s.name} <span style="font-size:9px;color:var(--color-text-tertiary)">(Top20 외)</span></td><td style="font-weight:500;color:#D85A30">${s.t3}</td><td><span class="gb" style="background:${GB[s.kg]};color:${GC[s.kg]}">${s.k}(${s.kg})</span></td><td><span class="gb" style="background:${GB[s.mg]};color:${GC[s.mg]}">${s.m}(${s.mg})</span></td><td><span class="gb" style="background:${GB[s.eg]};color:${GC[s.eg]}">${s.e}(${s.eg})</span></td><td>${tot(s)}</td><td style="font-size:10px;color:var(--color-text-secondary)">${s.school}</td></tr>`;
  }
  document.getElementById('list-body').innerHTML=`<table class="tbl"><colgroup><col style="width:26px"><col style="width:82px"><col style="width:38px"><col style="width:64px"><col style="width:64px"><col style="width:64px"><col style="width:38px"><col style="width:72px"></colgroup><thead><tr><th>순위</th><th>이름</th><th style="color:#185FA5">3합</th><th>국어</th><th>수학</th><th>영어</th><th>총점</th><th>출신중</th></tr></thead><tbody>${rows}${extraRow}</tbody></table><p style="font-size:10px;color:var(--color-text-tertiary);margin:6px 0 0">* 3합 동점 시 총점 높은 순 · 상위 20명 표시</p>`;
}

function renderOdap(who){
  const el=document.getElementById('odap-body');
  dc('odapDom');
  if(who==='all'){
    el.innerHTML=`<p style="font-size:11px;color:var(--color-text-secondary);text-align:center;padding:1.2rem 0">학생을 선택하면 개인 오답 분석 카드가 표시됩니다.</p>`;
    return;
  }
  const s=RAW.find(r=>r.name===who);
  const sMap={korean:{score:s.k,grade:s.kg,total:45,domains:KD,label:'국어'},math:{score:s.m,grade:s.mg,total:30,domains:MD,label:'수학'},english:{score:s.e,grade:s.eg,total:45,domains:ED,label:'영어'}};
  const {score,grade,total,domains,label}=sMap[curSubj];
  const seed=score*(curSubj==='korean'?7:curSubj==='math'?13:17);
  const wrong=wrongNums(score,total,seed);
  const correctCount=total-wrong.length;
  const correctPct=parseFloat((correctCount/total*100).toFixed(1));

  const qIdxToDom={};
  domains.forEach((d,di)=>{d.items.forEach(n=>{qIdxToDom[n]=di;});});

  const domBorderColors=['#378ADD','#1D9E75','#BA7517','#D85A30','#7F77DD','#D4537E','#534AB7','#0F6E56','#993C1D','#72243E','#444441'];

  const qGrid=Array.from({length:total},(_,i)=>{
    const n=i+1,isX=wrong.includes(n);const di=qIdxToDom[n];
    const domColor=di!==undefined?domBorderColors[di%domBorderColors.length]:'#888780';
    return`<div class="qcell ${isX?'wrong':'correct'}" title="${n}번 · ${domains[di]?.name||''} · ${isX?'오답':'정답'}" style="border-left:3px solid ${domColor}">${n}</div>`;
  }).join('');

  const domStats=domains.map((d,di)=>{
    const wc=d.items.filter(n=>wrong.includes(n)).length;
    const rate=parseFloat((wc/d.items.length*100).toFixed(0));
    const color=domBorderColors[di%domBorderColors.length];
    return{...d,wrongCount:wc,total:d.items.length,rate,color};
  }).sort((a,b)=>b.rate-a.rate);

  el.innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:10px 14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)">
    <div style="display:flex;align-items:center;gap:14px">
      <div>
        <span style="font-size:11px;color:var(--color-text-secondary)">${label} · ${s.name}</span>
        <div style="display:flex;align-items:baseline;gap:6px;margin-top:2px">
          <span style="font-size:22px;font-weight:500">${score}</span>
          <span style="font-size:11px;color:var(--color-text-tertiary)">점</span>
          <span class="gb" style="background:${GB[grade]};color:${GC[grade]};margin-left:4px">${grade}등급</span>
        </div>
      </div>
      <div style="border-left:0.5px solid var(--color-border-secondary);padding-left:14px">
        <span style="font-size:11px;color:var(--color-text-secondary)">정답률</span>
        <div style="display:flex;align-items:baseline;gap:4px;margin-top:2px">
          <span style="font-size:18px;font-weight:500;color:#0F6E56">${correctPct}%</span>
          <span style="font-size:10px;color:var(--color-text-tertiary)">${correctCount}/${total}</span>
        </div>
      </div>
    </div>
    <div style="text-align:right">
      <span style="font-size:11px;color:var(--color-text-secondary)">오답</span>
      <div style="font-size:18px;font-weight:500;color:#A32D2D">${wrong.length}<span style="font-size:11px;font-weight:400;color:var(--color-text-tertiary)">문항</span></div>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:14px;margin:0 0 16px;padding:8px 14px;background:var(--color-background-primary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary)">
    <div style="flex:1;height:16px;background:var(--color-background-secondary);border-radius:8px;overflow:hidden;display:flex">
      <div style="height:100%;background:#5DCAA5;width:${correctPct}%"></div>
      <div style="height:100%;background:#F09595;width:${100-correctPct}%"></div>
    </div>
    <span style="font-size:11px;color:var(--color-text-secondary)">정답 <b style="color:#0F6E56">${correctCount}</b> · 오답 <b style="color:#A32D2D">${wrong.length}</b></span>
  </div>

  <div style="display:grid;grid-template-columns:1.1fr 1fr;gap:14px;margin-bottom:14px">

    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <p style="font-size:12px;font-weight:500;margin:0">문항별 O/X 히트맵</p>
        <div class="legend-row">
          <span class="legend-chip"><span class="legend-sq" style="background:#E1F5EE;border:0.5px solid #9FE1CB"></span>정답</span>
          <span class="legend-chip"><span class="legend-sq" style="background:#FCEBEB;border:0.5px solid #F09595"></span>오답</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(15,1fr);gap:3px">${qGrid}</div>
      <p style="font-size:9px;color:var(--color-text-tertiary);margin:7px 0 0">* 왼쪽 색 막대는 출제 영역 · 마우스를 올리면 문항 상세</p>
      ${wrong.length>0?`<div style="margin-top:10px;padding:7px 10px;background:#FCEBEB;border-radius:var(--border-radius-md);border-left:2px solid #A32D2D;border-radius:var(--border-radius-md)">
        <span style="font-size:10px;color:#993C1D">오답 문항:</span>
        <span style="font-size:11px;color:#501313;font-weight:500;margin-left:4px">${wrong.join(', ')}번</span>
      </div>`:''}
    </div>

    <div>
      <p style="font-size:12px;font-weight:500;margin:0 0 8px">영역별 오답 집중도</p>
      <div style="position:relative;height:${domains.length*26+20}px"><canvas id="cOdapDom" role="img" aria-label="영역별 오답율 가로 막대 차트">영역별 오답율</canvas></div>
    </div>

  </div>

  <div>
    <p style="font-size:12px;font-weight:500;margin:0 0 8px">영역별 상세 분석</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:7px">
      ${domStats.map(d=>{
        const severity=d.rate===0?'safe':d.rate<=25?'low':d.rate<=50?'mid':'high';
        const sColor={safe:'#1D9E75',low:'#639922',mid:'#BA7517',high:'#A32D2D'}[severity];
        const sBg={safe:'#E1F5EE',low:'#EAF3DE',mid:'#FAEEDA',high:'#FCEBEB'}[severity];
        const sLabel={safe:'우수',low:'양호',mid:'주의',high:'집중보완'}[severity];
        return`<div class="dom-card" style="border-left:3px solid ${d.color}">
          <div class="dom-bar" style="background:${d.color};width:${d.rate}%"></div>
          <div class="dom-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
              <span style="font-size:11px;font-weight:500">${d.name}</span>
              <span class="gb" style="background:${sBg};color:${sColor}">${sLabel}</span>
            </div>
            <div style="display:flex;align-items:baseline;gap:4px">
              <span style="font-size:16px;font-weight:500;color:${sColor}">${d.wrongCount}</span>
              <span style="font-size:10px;color:var(--color-text-secondary)">/ ${d.total}문항</span>
              <span style="font-size:10px;color:var(--color-text-tertiary);margin-left:auto">오답율 ${d.rate}%</span>
            </div>
            <p style="font-size:9px;color:var(--color-text-tertiary);margin:3px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">문항 ${d.items.join(', ')}</p>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <div style="margin-top:12px;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary)">
    <p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 6px">모의고사 추이 (국어 / 수학 / 영어)</p>
    <table class="tbl"><thead><tr><th>회차</th><th>국어</th><th>수학</th><th>영어</th><th>국어등급</th><th>수학등급</th><th>영어등급</th></tr></thead><tbody>
      <tr><td style="font-weight:500">3월</td><td>${s.k}</td><td>${s.m}</td><td>${s.e}</td><td><span class="gb" style="background:${GB[s.kg]};color:${GC[s.kg]}">${s.kg}</span></td><td><span class="gb" style="background:${GB[s.mg]};color:${GC[s.mg]}">${s.mg}</span></td><td><span class="gb" style="background:${GB[s.eg]};color:${GC[s.eg]}">${s.eg}</span></td></tr>
      <tr><td style="color:var(--color-text-tertiary)">6월</td><td colspan="6" style="color:var(--color-text-tertiary);font-size:10px;text-align:left">— 데이터 없음</td></tr>
      <tr><td style="color:var(--color-text-tertiary)">9월</td><td colspan="6" style="color:var(--color-text-tertiary);font-size:10px;text-align:left">— 데이터 없음</td></tr>
      <tr><td style="color:var(--color-text-tertiary)">10월</td><td colspan="6" style="color:var(--color-text-tertiary);font-size:10px;text-align:left">— 데이터 없음</td></tr>
    </tbody></table>
  </div>`;

  const ctx=document.getElementById('cOdapDom');
  if(ctx){
    ch['odapDom']=new Chart(ctx,{type:'bar',data:{labels:domStats.map(d=>d.name),datasets:[{label:'오답율',data:domStats.map(d=>d.rate),backgroundColor:domStats.map(d=>{
      const r=d.rate;return r===0?'#9FE1CB':r<=25?'#C0DD97':r<=50?'#FAC775':'#F09595';
    }),borderColor:domStats.map(d=>{
      const r=d.rate;return r===0?'#1D9E75':r<=25?'#639922':r<=50?'#BA7517':'#A32D2D';
    }),borderWidth:1,borderRadius:3,barThickness:18}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:(c)=>{const d=domStats[c.dataIndex];return `오답 ${d.wrongCount}/${d.total}문항 (${d.rate}%)`;}}}},scales:{x:{min:0,max:100,grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:9},callback:v=>v+'%'}},y:{grid:{display:false},ticks:{font:{size:10}}}}}});
  }
}

renderAll();
</script>
